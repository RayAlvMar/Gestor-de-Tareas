{% extends "index.html" %}

{% block rayito %}
<h2 class="ms-4 mb-0 fw-light text-uppercase" style="color: #4a5568; letter-spacing: 4px; font-size: 1.4rem;">
    Recuperar Contraseña
</h2>
{% endblock %}

{% block contenido %}

<div class="row justify-content-center">
<div class="col-md-5">
<div class="p-4 rounded-4 shadow-sm" style="background-color: #f8f9ff; border: 1px solid #e0e3ff;">
<form method="POST" action="/login">
<div class="input-group mb-3 border rounded-3 overflow-hidden">
     <span class="input-group-text bg-transparent border-0">
        <i class="bi bi-envelope"></i>
    </span>
    <input type="email" name="email" class="form-control border-0" placeholder="Ingresa tu correo electrónico" required>
</div>

<div class="input-group mb-4 border rounded-3 overflow-hidden">
    <span class="input-group-text bg-transparent border-0">
        <i class="bi bi-person-arms-up"></i>
    </span>
    <input type="password" name="password" class="form-control border-0" placeholder="Ingresa algún dato que escribiste al crear la cuenta." required>
</div>

<button type="submit" class="btn w-100 text-white rounded-3" style="background-color:#6770da;">
    Recuperar la contraseña
</button>

</form>
</div>
</div>
</div>

{% endblock %}
